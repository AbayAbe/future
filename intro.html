<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1 - Mission Briefing</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/script.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="audio/romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="character">🧭</div>
    <div class="progress">LEVEL 1 / 4</div>
    <h2>Briefing dulu ya Fir hehe</h2>
    
    <p id="typedText"></p>
    
    <div style="margin-top: 30px;">
        <button onclick="lanjutKeVideo()">Lanjut ke Level 2 🚀</button>
        <button class="noButton" id="no" onmouseover="moveButton()" onclick="moveButton()">Aku menyerah 🙃</button>
    </div>
</div>

<script>
// Sinkronisasi Musik
const music = document.getElementById("bgMusic");

window.onload = () => {
    // 1. Ambil posisi waktu terakhir
    const savedTime = localStorage.getItem("musicCurrentTime");
    if (savedTime) {
        music.currentTime = parseFloat(savedTime);
    }
    
    // 2. Mainkan musik
    music.volume = 0.5;
    music.play().catch(() => console.log("Menunggu klik..."));
    
    // 3. Jalankan efek typing
    type1();
};

// Update posisi musik setiap detik
setInterval(() => {
    if(!music.paused) {
        localStorage.setItem("musicCurrentTime", music.currentTime);
    }
}, 1000);

function lanjutKeVideo() {
    localStorage.setItem("musicCurrentTime", music.currentTime);
    window.location.href = "video.html";
}

// Typing effect
const text1 = "Game ini sebenarnya dibuat karena ada sesuatu yang ingin aku sampaikan. Tapi ngomong langsung agak susah, jadi aku bikin game kecil ini, just enjoy it 😅";
let i = 0; 
const typedText1 = document.getElementById("typedText");
function type1(){
    if(i < text1.length){
        typedText1.innerHTML += text1.charAt(i);
        i++;
        setTimeout(type1, 45);
    }
} 

// Partikel Jejak Kaki (🐾)
for(let i=0; i<12; i++){
    let fp = document.createElement("div"); 
    fp.innerHTML = "🐾"; 
    fp.className = "star"; // Menggunakan class star dari CSS agar animasinya seragam
    fp.style.left = Math.random() * 100 + "vw"; 
    fp.style.animationDuration = (Math.random() * 5 + 5) + "s"; 
    document.body.appendChild(fp);
}

// Fungsi tombol menghindar
function moveButton(){
    const button = document.getElementById("no");
    // Kurangi jangkauan agar tidak terlalu ke pinggir layar
    const x = Math.random() * (window.innerWidth - button.offsetWidth - 50); 
    const y = Math.random() * (window.innerHeight - button.offsetHeight - 50);
    
    button.style.position = "fixed";
    button.style.left = x + "px"; 
    button.style.top = y + "px";
    button.style.zIndex = "999";
}
</script>
</body>
</html>
