<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Game - Level 0</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/script.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="audio/romantic.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="icon">🎮</div>
        
        <h1>MISSION GAME</h1>
        
        <p id="typedText"></p>
        
        <div class="progress">LEVEL 0 / 4</div>
        
        <button onclick="mulaiGame()">START GAME 🚀</button>
    </div>

    <script>
        // 1. Logic Efek Mengetik
        const text0 = "Selamat datang di game kecil yang aku buat khusus untuk kamu. Selesaikan semua level untuk membuka hadiah terakhir.";
        let j = 0; 
        const typedText0 = document.getElementById("typedText");
        
        function type0(){
            if(j < text0.length){
                typedText0.innerHTML += text0.charAt(j);
                j++;
                setTimeout(type0, 45);
            }
        } 
        window.onload = type0;

        // 2. Logic Bintang (Hanya muncul di halaman ini)
        for(let i=0; i<15; i++){
            let star = document.createElement("div"); 
            star.innerHTML = "⭐"; 
            star.className = "star"; 
            star.style.left = Math.random() * 100 + "vw"; 
            star.style.animationDuration = (Math.random() * 5 + 5) + "s"; 
            document.body.appendChild(star);
        }

        // 3. Logic Pindah Page & Musik
        function mulaiGame() {
            const music = document.getElementById("bgMusic");
            
            music.play().then(() => {
                // Simpan status musik di browser
                localStorage.setItem("musikAktif", "true");
                localStorage.setItem("musicCurrentTime", 0);
                
                setTimeout(() => {
                    window.location.href = "intro.html";
                }, 500);
            }).catch(error => {
                console.log("Autoplay dicegah, memindahkan halaman...");
                window.location.href = "intro.html";
            });
        }
    </script>
</body>
</html>
