<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Level 3 - Secret Song</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/script.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{text-align:center;margin:0;padding-top:80px;font-family:'Fredoka',sans-serif;color:#1f2937;overflow-x:hidden;}
.container{width:85%;max-width:700px;margin:auto;background:white;padding:45px;border-radius:25px;box-shadow:0 15px 35px rgba(0,0,0,0.2);}
.character{font-size:80px; display:block;margin-bottom:20px;animation: floatChar 3s ease-in-out infinite alternate;}
@keyframes floatChar{0%{transform:translateY(0);}100%{transform:translateY(-15px);}}
#typedText{font-size:18px; line-height:1.6;margin-top:20px;min-height:60px;}
button{padding:14px 30px; font-size:18px; border:none; border-radius:14px; margin:10px; cursor:pointer; background:linear-gradient(135deg,#22c55e,#4ade80); color:white; font-weight:bold; transition:0.3s; box-shadow:0 6px 0 #15803d;}
button:hover{transform:translateY(-3px); box-shadow:0 6px 10px rgba(0,0,0,0.2);}
@media(max-width:600px){.character{font-size:60px;}#typedText{font-size:16px;}button{font-size:16px;padding:12px 25px;}}
.note{position:absolute;font-size:25px; animation:noteMove linear infinite; opacity:0.8;}
@keyframes noteMove{0%{transform:translateY(100vh) rotate(0deg);}100%{transform:translateY(-120px) rotate(360deg);}}
</style>
</head>
<body>

<div class="container">
  <div class="character">🎵</div>
  <div class="progress">Level 3 / 4</div>
  <h2>Secret Song</h2>
  <p id="typedText"></p>

  <h1>PARAH</h1>
  <p>atau</p>
  <h1>HARAP</h1>
  <p>Tergantung bagaimana cerita kita nanti.</p>

  <a href="https://www.instagram.com/reel/C2mQoZJyYdL/?igsh=ajljc2hpODlyeW1t" target="_blank">
    <button>Dengar Lagu 🎧</button>
  </a>

  <br><br>
  <a href="confess.html">
    <button>Masuk Final Level</button>
  </a>
</div>

<script>
// typing
const text3="Aku juga pernah membuat lagu. Judulnya bisa jadi PARAH atau HARAP, tergantung bagaimana cerita kita nanti.";
let i3=0; const typedText3=document.getElementById("typedText");
function type3(){if(i3<text3.length){typedText3.innerHTML+=text3.charAt(i3);i3++;setTimeout(type3,40);}} type3();

// music note particles
for(let i=0;i<15;i++){
    let note=document.createElement("div");
    note.innerHTML="🎶";
    note.className="note";
    note.style.left=Math.random()*100+"vw";
    note.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(note);
}
</script>
</body>
</html>
