<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - Memory Unlock</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/script.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="audio/romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="character">🎬</div>
    <div class="progress">LEVEL 2 / 4</div>
    <h2>Memory Unlock</h2>
    
    <p id="typedText"></p>

    <div style="margin-top: 25px;">
        <a href="https://drive.google.com/drive/u/0/folders/1Fo58Qr3IgZCwRKWfbdZ2fbXeai2oRrcB" target="_blank" onclick="pelankanMusik()">
            <button style="background: linear-gradient(135deg, #f59e0b, #fbbf24); box-shadow: 0 6px 0 #b45309;">Tonton Video 🎥</button>
        </a>
    </div>

    <div style="margin-top: 15px;">
        <button class="btn-next" onclick="keHalamanLagu()" style="background: linear-gradient(135deg, #6366f1, #a855f7); box-shadow: 0 6px 0 #4338ca;">Level Selesai ➜</button>
    </div>
</div>

<script>
const music = document.getElementById("bgMusic");

window.onload = () => {
    // 1. Sinkronisasi Musik
    const savedTime = localStorage.getItem("musicCurrentTime");
    if (savedTime) {
        music.currentTime = parseFloat(savedTime);
    }
    music.volume = 0.5;
    music.play().catch(() => console.log("Menunggu interaksi..."));
    
    // 2. Jalankan efek typing
    type2();
};

// Update waktu secara berkala agar tidak terputus saat pindah
setInterval(() => {
    if(!music.paused) {
        localStorage.setItem("musicCurrentTime", music.currentTime);
    }
}, 1000);

function pelankanMusik() {
    // Mengecilkan volume agar suara video di Drive lebih terdengar
    music.volume = 0.1;
}

function keHalamanLagu() {
    localStorage.setItem("musicCurrentTime", music.currentTime);
    window.location.href = "lagu.html";
}

// Logic Mengetik
const text2="Di level ini kamu harus membuka sebuah kenangan lama. Aku udah ngebuat video ini dari lama, tapi aku gatau sebenernya bisa gak  sih sampai ke kamu.";
let k=0; 
const typedText2 = document.getElementById("typedText");
function type2(){
    if(k < text2.length){
        typedText2.innerHTML += text2.charAt(k);
        k++;
        setTimeout(type2, 45);
    }
}

// Camera emoji particles (🎥)
for(let i=0; i<12; i++){
    let cam = document.createElement("div");
    cam.innerHTML = "🎥";
    cam.className = "star"; // Menggunakan class star dari CSS agar melayang ke atas
    cam.style.left = Math.random() * 100 + "vw";
    cam.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.body.appendChild(cam);
}
</script>
</body>
</html>
